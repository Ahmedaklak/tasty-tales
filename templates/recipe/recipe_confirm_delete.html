{% extends 'base.html' %}

{% block title %}Delete Recipe | Tasty Tales{% endblock %}

{% block content %}
<h1>Delete Recipe</h1>
<p>Are you sure you want to delete
    <strong>{{ recipe.title }}</strong>?</p>
<p>This action cannot be undone.</p>
<form method="post">
    {% csrf_token %}
    <button type="submit" class="btn btn-danger">
        Yes, Delete
    </button>
    <a href="{% url 'recipe_detail' recipe.slug %}"
        class="btn btn-secondary">Cancel</a>
</form>
{% endblock %}
