{% extends 'base.html' %}
{% load crispy_forms_tags %}

{% block title %}Login | Tasty Tales{% endblock %}

{% block content %}
<h1>Login</h1>
<div class="row">
    <div class="col-md-6">
        <form method="post">
            {% csrf_token %}
            {{ form|crispy }}
            <button type="submit"
                class="btn btn-primary mt-3">Login</button>
        </form>
        <p class="mt-3">Don't have an account?
            <a href="{% url 'account_signup' %}">
                Register here</a></p>
    </div>
</div>
{% endblock %}
